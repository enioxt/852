name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify local production
        env:
          VERIFY_RATE_LIMIT: "0"
          LOCAL_PORT: "3100"
          LOCAL_BASE_URL: http://127.0.0.1:3100
        run: npm run verify:local-prod
