services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 852-app
    container_name: 852-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
